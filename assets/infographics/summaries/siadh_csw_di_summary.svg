<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- Title Banner -->
  <rect x="0" y="0" width="800" height="65" fill="#1A1F2E"/>
  <text x="400" y="30" text-anchor="middle" fill="#22D3EE" font-size="24" font-weight="700" letter-spacing="1">SODIUM DISORDERS IN TBI</text>
  <text x="400" y="50" text-anchor="middle" fill="#5A6575" font-size="13">SIADH vs CSW vs Diabetes Insipidus</text>
  <line x1="100" y1="62" x2="700" y2="62" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Column Headers -->
  <!-- Parameter column -->
  <rect x="25" y="80" rx="8" ry="8" width="160" height="50" fill="#1A1F2E" stroke="#3A4255" stroke-width="1.5"/>
  <text x="105" y="110" text-anchor="middle" fill="#E8ECF1" font-size="14" font-weight="700">Parameter</text>

  <!-- SIADH -->
  <rect x="195" y="80" rx="8" ry="8" width="190" height="50" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="2"/>
  <text x="290" y="105" text-anchor="middle" fill="#22D3EE" font-size="16" font-weight="700">SIADH</text>
  <text x="290" y="122" text-anchor="middle" fill="#22D3EE" font-size="9" opacity="0.8">Syndrome of Inappropriate ADH</text>

  <!-- CSW -->
  <rect x="395" y="80" rx="8" ry="8" width="190" height="50" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="2"/>
  <text x="490" y="105" text-anchor="middle" fill="#F59E0B" font-size="16" font-weight="700">CSW</text>
  <text x="490" y="122" text-anchor="middle" fill="#F59E0B" font-size="9" opacity="0.8">Cerebral Salt Wasting</text>

  <!-- DI -->
  <rect x="595" y="80" rx="8" ry="8" width="180" height="50" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-width="2"/>
  <text x="685" y="105" text-anchor="middle" fill="#EF4444" font-size="16" font-weight="700">DI</text>
  <text x="685" y="122" text-anchor="middle" fill="#EF4444" font-size="9" opacity="0.8">Diabetes Insipidus</text>

  <!-- ===== ROW: Mechanism ===== -->
  <rect x="25" y="145" rx="0" ry="0" width="160" height="70" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="175" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Mechanism</text>

  <rect x="195" y="145" width="190" height="70" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="168" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="600">Excess ADH secretion</text>
  <text x="290" y="185" text-anchor="middle" fill="#8A9AB5" font-size="9">Free water retention</text>
  <text x="290" y="200" text-anchor="middle" fill="#8A9AB5" font-size="9">Dilutional hyponatremia</text>

  <rect x="395" y="145" width="190" height="70" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="168" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">Renal Na wasting</text>
  <text x="490" y="185" text-anchor="middle" fill="#8A9AB5" font-size="9">BNP/ANP mediated</text>
  <text x="490" y="200" text-anchor="middle" fill="#8A9AB5" font-size="9">Salt + water loss</text>

  <rect x="595" y="145" width="180" height="70" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="168" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="600">Insufficient ADH</text>
  <text x="685" y="185" text-anchor="middle" fill="#8A9AB5" font-size="9">Cannot concentrate urine</text>
  <text x="685" y="200" text-anchor="middle" fill="#8A9AB5" font-size="9">Massive free water loss</text>

  <!-- ===== ROW: Serum Na ===== -->
  <rect x="25" y="225" width="160" height="55" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="255" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Serum Na</text>

  <rect x="195" y="225" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="248" text-anchor="middle" fill="#22D3EE" font-size="18" font-weight="700">&#x2193; LOW</text>
  <text x="290" y="268" text-anchor="middle" fill="#8A9AB5" font-size="10">&lt; 135 mEq/L</text>

  <rect x="395" y="225" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="248" text-anchor="middle" fill="#F59E0B" font-size="18" font-weight="700">&#x2193; LOW</text>
  <text x="490" y="268" text-anchor="middle" fill="#8A9AB5" font-size="10">&lt; 135 mEq/L</text>

  <rect x="595" y="225" width="180" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="248" text-anchor="middle" fill="#EF4444" font-size="18" font-weight="700">&#x2191; HIGH</text>
  <text x="685" y="268" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 145 mEq/L</text>

  <!-- ===== ROW: Serum Osm ===== -->
  <rect x="25" y="290" width="160" height="55" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="320" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Serum Osm</text>

  <rect x="195" y="290" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="313" text-anchor="middle" fill="#22D3EE" font-size="15" font-weight="700">&#x2193; LOW</text>
  <text x="290" y="333" text-anchor="middle" fill="#8A9AB5" font-size="10">&lt; 280 mOsm/kg</text>

  <rect x="395" y="290" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="313" text-anchor="middle" fill="#F59E0B" font-size="15" font-weight="700">&#x2193; LOW</text>
  <text x="490" y="333" text-anchor="middle" fill="#8A9AB5" font-size="10">&lt; 280 mOsm/kg</text>

  <rect x="595" y="290" width="180" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="313" text-anchor="middle" fill="#EF4444" font-size="15" font-weight="700">&#x2191; HIGH</text>
  <text x="685" y="333" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 295 mOsm/kg</text>

  <!-- ===== ROW: Urine Osm ===== -->
  <rect x="25" y="355" width="160" height="55" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="385" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Urine Osm</text>

  <rect x="195" y="355" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="378" text-anchor="middle" fill="#22D3EE" font-size="15" font-weight="700">&#x2191; HIGH</text>
  <text x="290" y="398" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 100 mOsm/kg (concentrated)</text>

  <rect x="395" y="355" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="378" text-anchor="middle" fill="#F59E0B" font-size="15" font-weight="700">&#x2191; HIGH</text>
  <text x="490" y="398" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 100 mOsm/kg</text>

  <rect x="595" y="355" width="180" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="378" text-anchor="middle" fill="#EF4444" font-size="15" font-weight="700">&#x2193; LOW</text>
  <text x="685" y="398" text-anchor="middle" fill="#8A9AB5" font-size="10">&lt; 200 mOsm/kg (dilute)</text>

  <!-- ===== ROW: Urine Na ===== -->
  <rect x="25" y="420" width="160" height="55" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="450" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Urine Na</text>

  <rect x="195" y="420" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="443" text-anchor="middle" fill="#22D3EE" font-size="15" font-weight="700">&#x2191; HIGH</text>
  <text x="290" y="463" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 40 mEq/L</text>

  <rect x="395" y="420" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="443" text-anchor="middle" fill="#F59E0B" font-size="15" font-weight="700">&#x2191; HIGH</text>
  <text x="490" y="463" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt; 40 mEq/L</text>

  <rect x="595" y="420" width="180" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="443" text-anchor="middle" fill="#EF4444" font-size="15" font-weight="700">&#x2193; LOW</text>
  <text x="685" y="463" text-anchor="middle" fill="#8A9AB5" font-size="10">Variable</text>

  <!-- ===== ROW: Volume Status (KEY DIFFERENTIATOR) ===== -->
  <rect x="25" y="490" width="160" height="70" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="105" y="518" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Volume Status</text>
  <text x="105" y="537" text-anchor="middle" fill="#F59E0B" font-size="9">KEY DIFFERENTIATOR</text>

  <rect x="195" y="490" width="190" height="70" fill="#22D3EE" fill-opacity="0.06" stroke="#22D3EE" stroke-width="2"/>
  <text x="290" y="518" text-anchor="middle" fill="#22D3EE" font-size="16" font-weight="700">EUVOLEMIC</text>
  <text x="290" y="540" text-anchor="middle" fill="#22D3EE" font-size="11">or mildly hypervolemic</text>

  <rect x="395" y="490" width="190" height="70" fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-width="2"/>
  <text x="490" y="518" text-anchor="middle" fill="#F59E0B" font-size="16" font-weight="700">HYPOVOLEMIC</text>
  <text x="490" y="540" text-anchor="middle" fill="#F59E0B" font-size="11">Volume depleted</text>

  <rect x="595" y="490" width="180" height="70" fill="#EF4444" fill-opacity="0.06" stroke="#EF4444" stroke-width="2"/>
  <text x="685" y="518" text-anchor="middle" fill="#EF4444" font-size="16" font-weight="700">HYPOVOLEMIC</text>
  <text x="685" y="540" text-anchor="middle" fill="#EF4444" font-size="11">Polyuria &#x2192; dehydrated</text>

  <!-- ===== ROW: Urine Output ===== -->
  <rect x="25" y="570" width="160" height="55" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="600" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Urine Output</text>

  <rect x="195" y="570" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="593" text-anchor="middle" fill="#22D3EE" font-size="14" font-weight="600">&#x2193; Decreased</text>
  <text x="290" y="613" text-anchor="middle" fill="#8A9AB5" font-size="10">Concentrated, low volume</text>

  <rect x="395" y="570" width="190" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="593" text-anchor="middle" fill="#F59E0B" font-size="14" font-weight="600">&#x2191; Increased</text>
  <text x="490" y="613" text-anchor="middle" fill="#8A9AB5" font-size="10">High Na urine output</text>

  <rect x="595" y="570" width="180" height="55" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="593" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="600">&#x2191;&#x2191; Very High</text>
  <text x="685" y="613" text-anchor="middle" fill="#8A9AB5" font-size="10">&gt;3L/day, very dilute</text>

  <!-- ===== ROW: Treatment ===== -->
  <rect x="25" y="640" width="160" height="90" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="680" text-anchor="middle" fill="#E8ECF1" font-size="13" font-weight="700">Treatment</text>

  <rect x="195" y="640" width="190" height="90" fill="#0F1419" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="290" y="665" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">Fluid RESTRICTION</text>
  <text x="290" y="683" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; Restrict to 800-1000 mL/day</text>
  <text x="290" y="698" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; Salt tabs if needed</text>
  <text x="290" y="713" text-anchor="middle" fill="#8A9AB5" font-size="9">&#x2022; Demeclocycline / Vaptans</text>

  <rect x="395" y="640" width="190" height="90" fill="#0F1419" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="490" y="665" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">Volume REPLACEMENT</text>
  <text x="490" y="683" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; NS or hypertonic saline</text>
  <text x="490" y="698" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; Replace Na + volume</text>
  <text x="490" y="713" text-anchor="middle" fill="#8A9AB5" font-size="9">&#x2022; Fludrocortisone</text>

  <rect x="595" y="640" width="180" height="90" fill="#0F1419" stroke="#EF4444" stroke-width="1.5"/>
  <text x="685" y="665" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="700">DDAVP + Free Water</text>
  <text x="685" y="683" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; Desmopressin (DDAVP)</text>
  <text x="685" y="698" text-anchor="middle" fill="#E8ECF1" font-size="10">&#x2022; Replete free water</text>
  <text x="685" y="713" text-anchor="middle" fill="#8A9AB5" font-size="9">&#x2022; Monitor UOP + Na q2-4h</text>

  <!-- ===== ROW: Timing ===== -->
  <rect x="25" y="745" width="160" height="50" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <text x="105" y="775" text-anchor="middle" fill="#E8ECF1" font-size="12" font-weight="600">Typical Timing</text>

  <rect x="195" y="745" width="190" height="50" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="290" y="770" text-anchor="middle" fill="#E8ECF1" font-size="11">Days to weeks post-TBI</text>
  <text x="290" y="785" text-anchor="middle" fill="#8A9AB5" font-size="9">Most common Na disorder</text>

  <rect x="395" y="745" width="190" height="50" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="490" y="770" text-anchor="middle" fill="#E8ECF1" font-size="11">Days post-TBI (SAH common)</text>
  <text x="490" y="785" text-anchor="middle" fill="#8A9AB5" font-size="9">Often self-limited</text>

  <rect x="595" y="745" width="180" height="50" fill="#0F1419" stroke="#2A3040" stroke-width="1"/>
  <text x="685" y="770" text-anchor="middle" fill="#E8ECF1" font-size="11">Hours to days post-TBI</text>
  <text x="685" y="785" text-anchor="middle" fill="#8A9AB5" font-size="9">Pituitary stalk injury</text>

  <!-- ===== HIGH-YIELD PEARLS ===== -->
  <rect x="50" y="820" rx="12" ry="12" width="700" height="240" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <rect x="50" y="820" rx="12" ry="12" width="700" height="40" fill="#F59E0B" fill-opacity="0.1"/>
  <text x="400" y="845" text-anchor="middle" fill="#F59E0B" font-size="16" font-weight="700">HIGH-YIELD PEARLS</text>

  <!-- Pearl 1 -->
  <circle cx="80" cy="887" r="10" fill="#F59E0B" opacity="0.25"/>
  <text x="80" y="891" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">1</text>
  <text x="100" y="883" fill="#E8ECF1" font-size="12" font-weight="600">CSW is HYPOvolemic &#x2014; treatment is OPPOSITE of SIADH</text>
  <text x="100" y="898" fill="#8A9AB5" font-size="10">SIADH = restrict fluids | CSW = give fluids (both have low Na!)</text>

  <!-- Pearl 2 -->
  <circle cx="80" cy="927" r="10" fill="#F59E0B" opacity="0.25"/>
  <text x="80" y="931" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">2</text>
  <text x="100" y="923" fill="#E8ECF1" font-size="12" font-weight="600">Volume status is the KEY to distinguishing SIADH from CSW</text>
  <text x="100" y="938" fill="#8A9AB5" font-size="10">Both have: low Na, low osm, high urine Na, high urine osm</text>

  <!-- Pearl 3 -->
  <circle cx="80" cy="967" r="10" fill="#F59E0B" opacity="0.25"/>
  <text x="80" y="971" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">3</text>
  <text x="100" y="963" fill="#E8ECF1" font-size="12" font-weight="600">DI: Think pituitary/hypothalamic injury</text>
  <text x="100" y="978" fill="#8A9AB5" font-size="10">Triphasic response: DI &#x2192; SIADH &#x2192; permanent DI</text>

  <!-- Pearl 4 -->
  <circle cx="80" cy="1007" r="10" fill="#F59E0B" opacity="0.25"/>
  <text x="80" y="1011" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">4</text>
  <text x="100" y="1003" fill="#E8ECF1" font-size="12" font-weight="600">Screen all moderate-severe TBI for pituitary dysfunction</text>
  <text x="100" y="1018" fill="#8A9AB5" font-size="10">Up to 25-50% have some degree of hypopituitarism</text>

  <!-- ===== CORRECTION WARNING ===== -->
  <rect x="100" y="1080" rx="12" ry="12" width="600" height="70" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="2"/>
  <text x="400" y="1108" text-anchor="middle" fill="#EF4444" font-size="18" font-weight="700">Na CORRECTION RATE</text>
  <text x="400" y="1130" text-anchor="middle" fill="#E8ECF1" font-size="14" font-weight="600">&#x2264; 10 mEq/L per 24 hours</text>
  <text x="400" y="1145" text-anchor="middle" fill="#EF4444" font-size="11">Overcorrection risk: Osmotic demyelination syndrome (ODS / CPM)</text>

  <!-- Footer -->
  <text x="400" y="1190" text-anchor="middle" fill="#3A4555" font-size="9">TBI Training | Board Review Quick Reference</text>
</svg>