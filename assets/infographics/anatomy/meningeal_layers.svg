<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#0A0E13"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#E8ECF1" opacity="0.7"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#E8ECF1" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" filter="url(#glow)">MENINGEAL LAYERS — Cross-Sectional View</text>
  <text x="400" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">Superficial → Deep (Outside → Brain Surface)</text>

  <!-- Layer definitions: y, height, fill, label, sublabel -->
  <!-- SCALP layers -->
  <!-- Skin -->
  <rect x="140" y="78" width="420" height="28" rx="2" fill="#8B6914" opacity="0.7" stroke="#B8860B" stroke-width="0.5"/>
  <text x="350" y="96" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Skin</text>

  <!-- Connective tissue -->
  <rect x="140" y="106" width="420" height="24" rx="2" fill="#9B7928" opacity="0.6" stroke="#B8860B" stroke-width="0.5"/>
  <text x="350" y="122" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Connective Tissue (dense)</text>

  <!-- Aponeurosis -->
  <rect x="140" y="130" width="420" height="22" rx="2" fill="#A08832" opacity="0.55" stroke="#B8860B" stroke-width="0.5"/>
  <text x="350" y="145" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Aponeurosis (galea aponeurotica)</text>

  <!-- Loose CT -->
  <rect x="140" y="152" width="420" height="22" rx="2" fill="#7A6820" opacity="0.5" stroke="#B8860B" stroke-width="0.5"/>
  <text x="350" y="167" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Loose Connective Tissue</text>

  <!-- Periosteum (pericranium) -->
  <rect x="140" y="174" width="420" height="22" rx="2" fill="#6B5A18" opacity="0.5" stroke="#B8860B" stroke-width="0.5"/>
  <text x="350" y="189" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Periosteum (Pericranium)</text>

  <!-- SCALP bracket -->
  <line x1="96" y1="78" x2="96" y2="196" stroke="#F59E0B" stroke-width="2"/>
  <line x1="96" y1="78" x2="106" y2="78" stroke="#F59E0B" stroke-width="2"/>
  <line x1="96" y1="196" x2="106" y2="196" stroke="#F59E0B" stroke-width="2"/>
  <text x="90" y="130" text-anchor="end" fill="#F59E0B" font-size="16" font-weight="700">S</text>
  <text x="90" y="145" text-anchor="end" fill="#F59E0B" font-size="16" font-weight="700">C</text>
  <text x="90" y="160" text-anchor="end" fill="#F59E0B" font-size="16" font-weight="700">A</text>
  <text x="90" y="175" text-anchor="end" fill="#F59E0B" font-size="16" font-weight="700">L</text>
  <text x="90" y="190" text-anchor="end" fill="#F59E0B" font-size="16" font-weight="700">P</text>

  <!-- SCALP mnemonic label -->
  <rect x="10" y="108" width="62" height="100" rx="4" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1" opacity="0.8"/>
  <text x="41" y="125" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">MNEMONIC</text>
  <text x="41" y="140" text-anchor="middle" fill="#E8ECF1" font-size="8">Skin</text>
  <text x="41" y="152" text-anchor="middle" fill="#E8ECF1" font-size="8">Conn. Tissue</text>
  <text x="41" y="164" text-anchor="middle" fill="#E8ECF1" font-size="8">Aponeurosis</text>
  <text x="41" y="176" text-anchor="middle" fill="#E8ECF1" font-size="8">Loose CT</text>
  <text x="41" y="188" text-anchor="middle" fill="#E8ECF1" font-size="8">Periosteum</text>

  <!-- SKULL -->
  <rect x="140" y="202" width="420" height="42" rx="2" fill="#4A5568" opacity="0.8" stroke="#718096" stroke-width="1"/>
  <text x="350" y="225" text-anchor="middle" fill="#E8ECF1" font-size="14" font-weight="700">SKULL (Calvarium)</text>
  <text x="350" y="238" text-anchor="middle" fill="#94A3B8" font-size="9">Outer table — Diploë — Inner table</text>

  <!-- Right side annotation for skull -->
  <line x1="560" y1="223" x2="620" y2="223" stroke="#718096" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- EPIDURAL SPACE -->
  <rect x="140" y="248" width="420" height="26" rx="2" fill="#EF4444" opacity="0.2" stroke="#EF4444" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="350" y="265" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="600">EPIDURAL SPACE (potential)</text>

  <!-- Annotation: MMA -->
  <line x1="560" y1="261" x2="620" y2="261" stroke="#EF4444" stroke-width="1"/>
  <circle cx="625" cy="261" r="3" fill="#EF4444"/>
  <text x="632" y="256" fill="#EF4444" font-size="10" font-weight="600">Middle Meningeal</text>
  <text x="632" y="268" fill="#EF4444" font-size="10" font-weight="600">Artery</text>
  <text x="632" y="280" fill="#EF4444" font-size="9" opacity="0.7">→ Epidural hematoma</text>

  <!-- DURA MATER -->
  <rect x="140" y="278" width="420" height="40" rx="2" fill="#22D3EE" opacity="0.2" stroke="#22D3EE" stroke-width="1.5"/>
  <!-- Periosteal layer -->
  <rect x="142" y="280" width="416" height="18" rx="1" fill="#22D3EE" opacity="0.12"/>
  <text x="350" y="293" text-anchor="middle" fill="#22D3EE" font-size="10">Periosteal Layer</text>
  <!-- Meningeal layer -->
  <rect x="142" y="298" width="416" height="18" rx="1" fill="#22D3EE" opacity="0.08"/>
  <text x="350" y="311" text-anchor="middle" fill="#22D3EE" font-size="10">Meningeal Layer</text>
  <!-- Label -->
  <text x="134" y="300" text-anchor="end" fill="#22D3EE" font-size="13" font-weight="700">DURA MATER</text>

  <!-- Annotation: Dural sinuses -->
  <line x1="560" y1="298" x2="620" y2="310" stroke="#22D3EE" stroke-width="1"/>
  <text x="625" y="314" fill="#22D3EE" font-size="10" font-weight="600">Dural Sinuses</text>
  <text x="625" y="326" fill="#94A3B8" font-size="9">(between periosteal &amp;</text>
  <text x="625" y="336" fill="#94A3B8" font-size="9">meningeal layers)</text>

  <!-- SUBDURAL SPACE -->
  <rect x="140" y="322" width="420" height="24" rx="2" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="350" y="338" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="600">SUBDURAL SPACE (potential)</text>

  <!-- Annotation: Bridging veins -->
  <line x1="560" y1="334" x2="620" y2="350" stroke="#F59E0B" stroke-width="1"/>
  <circle cx="625" cy="350" r="3" fill="#F59E0B"/>
  <text x="632" y="346" fill="#F59E0B" font-size="10" font-weight="600">Bridging Veins</text>
  <text x="632" y="358" fill="#F59E0B" font-size="9" opacity="0.7">→ Subdural hematoma</text>
  <text x="632" y="369" fill="#F59E0B" font-size="9" opacity="0.7">(elderly, shaken baby)</text>

  <!-- ARACHNOID MATER -->
  <rect x="140" y="350" width="420" height="32" rx="2" fill="#A78BFA" opacity="0.2" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="350" y="370" text-anchor="middle" fill="#A78BFA" font-size="13" font-weight="600">ARACHNOID MATER</text>
  <text x="134" y="370" text-anchor="end" fill="#A78BFA" font-size="11" font-weight="600">Arachnoid</text>

  <!-- Annotation: Arachnoid granulations -->
  <line x1="560" y1="366" x2="620" y2="390" stroke="#A78BFA" stroke-width="1"/>
  <text x="625" y="388" fill="#A78BFA" font-size="10" font-weight="600">Arachnoid Granulations</text>
  <text x="625" y="400" fill="#94A3B8" font-size="9">CSF reabsorption into</text>
  <text x="625" y="410" fill="#94A3B8" font-size="9">dural venous sinuses</text>

  <!-- SUBARACHNOID SPACE -->
  <rect x="140" y="386" width="420" height="50" rx="2" fill="#34D399" opacity="0.12" stroke="#34D399" stroke-width="1"/>
  <!-- CSF pattern -->
  <circle cx="200" cy="405" r="3" fill="#34D399" opacity="0.2"/>
  <circle cx="250" cy="415" r="2" fill="#34D399" opacity="0.2"/>
  <circle cx="310" cy="400" r="3" fill="#34D399" opacity="0.15"/>
  <circle cx="370" cy="418" r="2" fill="#34D399" opacity="0.2"/>
  <circle cx="420" cy="402" r="3" fill="#34D399" opacity="0.15"/>
  <circle cx="470" cy="420" r="2" fill="#34D399" opacity="0.2"/>
  <circle cx="520" cy="408" r="3" fill="#34D399" opacity="0.15"/>
  <text x="350" y="410" text-anchor="middle" fill="#34D399" font-size="13" font-weight="600">SUBARACHNOID SPACE</text>
  <text x="350" y="425" text-anchor="middle" fill="#34D399" font-size="10" opacity="0.8">Contains CSF &amp; Cerebral Arteries</text>

  <!-- Annotation: SAH -->
  <line x1="560" y1="411" x2="620" y2="435" stroke="#34D399" stroke-width="1"/>
  <text x="625" y="433" fill="#34D399" font-size="10" font-weight="600">CSF, Cerebral Arteries</text>
  <text x="625" y="445" fill="#34D399" font-size="9" opacity="0.7">→ Subarachnoid hemorrhage</text>
  <text x="625" y="456" fill="#34D399" font-size="9" opacity="0.7">(traumatic SAH)</text>

  <!-- PIA MATER -->
  <rect x="140" y="440" width="420" height="26" rx="2" fill="#EC4899" opacity="0.25" stroke="#EC4899" stroke-width="1.5"/>
  <text x="350" y="457" text-anchor="middle" fill="#EC4899" font-size="13" font-weight="600">PIA MATER</text>
  <text x="134" y="457" text-anchor="end" fill="#EC4899" font-size="11" font-weight="600">Pia</text>

  <!-- Annotation: Follows surface -->
  <line x1="560" y1="453" x2="620" y2="470" stroke="#EC4899" stroke-width="1"/>
  <text x="625" y="468" fill="#EC4899" font-size="10" font-weight="600">Follows Brain Surface</text>
  <text x="625" y="480" fill="#94A3B8" font-size="9">Closely adherent to cortex</text>
  <text x="625" y="490" fill="#94A3B8" font-size="9">including sulci &amp; gyri</text>

  <!-- BRAIN CORTEX -->
  <rect x="140" y="470" width="420" height="50" rx="6" fill="#1A1F2E" stroke="#4A5568" stroke-width="1"/>
  <!-- Gyri pattern -->
  <path d="M160,495 Q190,478 220,495 Q250,512 280,495 Q310,478 340,495 Q370,512 400,495 Q430,478 460,495 Q490,512 520,495 Q535,485 540,495" stroke="#4A5568" stroke-width="2" fill="none"/>
  <text x="350" y="490" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="600">CEREBRAL CORTEX</text>

  <!-- Direction arrow on left -->
  <line x1="122" y1="80" x2="122" y2="510" stroke="#4A5568" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="122,510 117,498 127,498" fill="#4A5568"/>
  <text x="118" y="530" text-anchor="end" fill="#4A5568" font-size="10" transform="rotate(-90,118,530)">SUPERFICIAL → DEEP</text>

  <!-- Board Pearl Box -->
  <rect x="40" y="545" width="720" height="44" rx="6" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
  <text x="56" y="564" fill="#22D3EE" font-size="11" font-weight="700">BOARD PEARL:</text>
  <text x="158" y="564" fill="#E8ECF1" font-size="11">Epidural = arterial (lucid interval) | Subdural = venous (bridging veins, elderly/infants)</text>
  <text x="158" y="580" fill="#E8ECF1" font-size="11">SAH = "worst headache" | Layers at risk define hemorrhage type &amp; clinical presentation</text>
</svg>