<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- Title Banner -->
  <rect x="0" y="0" width="800" height="65" fill="#1A1F2E"/>
  <text x="400" y="30" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="1">RANCHO LOS AMIGOS SCALE</text>
  <text x="400" y="50" text-anchor="middle" fill="#5A6575" font-size="13">Revised Scale (Levels I - X) &#x2014; Cognitive Functioning</text>
  <line x1="100" y1="62" x2="700" y2="62" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Color gradient progress bar (vertical left side) -->
  <rect x="25" y="80" rx="5" ry="5" width="12" height="1070" fill="#1A1F2E" stroke="#2A3040" stroke-width="1"/>
  <!-- Gradient segments -->
  <rect x="27" y="82" rx="3" ry="3" width="8" height="280" fill="#5A6575" opacity="0.5"/>
  <rect x="27" y="362" rx="0" ry="0" width="8" height="105" fill="#EF4444" opacity="0.7"/>
  <rect x="27" y="467" rx="0" ry="0" width="8" height="215" fill="#F59E0B" opacity="0.7"/>
  <rect x="27" y="682" rx="0" ry="0" width="8" height="225" fill="#22D3EE" opacity="0.7"/>
  <rect x="27" y="907" rx="3" ry="3" width="8" height="240" fill="#34D399" opacity="0.7"/>

  <!-- ===== LEVEL I ===== -->
  <rect x="50" y="82" rx="8" ry="8" width="730" height="90" fill="#1A1F2E" stroke="#5A6575" stroke-width="1.2" opacity="0.8"/>
  <rect x="50" y="82" rx="8" ry="8" width="50" height="90" fill="#5A6575" fill-opacity="0.15"/>
  <text x="75" y="118" text-anchor="middle" fill="#5A6575" font-size="22" font-weight="700">I</text>
  <text x="115" y="105" fill="#E8ECF1" font-size="14" font-weight="700">No Response</text>
  <text x="115" y="123" fill="#8A9AB5" font-size="11">Total unresponsiveness to all stimuli. No observable change in behavior.</text>
  <rect x="115" y="133" rx="4" ry="4" width="300" height="22" fill="#5A6575" fill-opacity="0.1" stroke="#5A6575" stroke-width="0.8"/>
  <text x="125" y="149" fill="#5A6575" font-size="10" font-weight="600">Mgmt: Sensory stimulation program, positioning, ROM</text>

  <!-- ===== LEVEL II ===== -->
  <rect x="50" y="180" rx="8" ry="8" width="730" height="90" fill="#1A1F2E" stroke="#5A6575" stroke-width="1.2" opacity="0.8"/>
  <rect x="50" y="180" rx="8" ry="8" width="50" height="90" fill="#5A6575" fill-opacity="0.15"/>
  <text x="75" y="216" text-anchor="middle" fill="#5A6575" font-size="22" font-weight="700">II</text>
  <text x="115" y="203" fill="#E8ECF1" font-size="14" font-weight="700">Generalized Response</text>
  <text x="115" y="221" fill="#8A9AB5" font-size="11">Inconsistent, non-purposeful reactions. Responds to pain, deep pressure.</text>
  <text x="115" y="237" fill="#8A9AB5" font-size="11">Delayed responses. Earliest eye opening.</text>
  <rect x="115" y="245" rx="4" ry="4" width="350" height="18" fill="#5A6575" fill-opacity="0.1" stroke="#5A6575" stroke-width="0.8"/>
  <text x="125" y="258" fill="#5A6575" font-size="10" font-weight="600">Mgmt: Structured sensory stimulation, coma stim program</text>

  <!-- ===== LEVEL III ===== -->
  <rect x="50" y="278" rx="8" ry="8" width="730" height="78" fill="#1A1F2E" stroke="#5A6575" stroke-width="1.2" opacity="0.8"/>
  <rect x="50" y="278" rx="8" ry="8" width="50" height="78" fill="#5A6575" fill-opacity="0.15"/>
  <text x="75" y="312" text-anchor="middle" fill="#5A6575" font-size="22" font-weight="700">III</text>
  <text x="115" y="300" fill="#E8ECF1" font-size="14" font-weight="700">Localized Response</text>
  <text x="115" y="318" fill="#8A9AB5" font-size="11">Inconsistently localizes to stimuli. Follows simple commands inconsistently.</text>
  <text x="115" y="334" fill="#8A9AB5" font-size="11">May pull at tubes/restraints. Emerging awareness.</text>
  <rect x="115" y="338" rx="4" ry="4" width="280" height="14" fill="#5A6575" fill-opacity="0.1" stroke="#5A6575" stroke-width="0.8"/>
  <text x="125" y="349" fill="#5A6575" font-size="9" font-weight="600">Mgmt: Structured environment, familiar voices</text>

  <!-- ===== LEVEL IV ===== -->
  <rect x="50" y="365" rx="8" ry="8" width="730" height="98" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <rect x="50" y="365" rx="8" ry="8" width="50" height="98" fill="#EF4444" fill-opacity="0.2"/>
  <text x="75" y="405" text-anchor="middle" fill="#EF4444" font-size="22" font-weight="700">IV</text>
  <text x="115" y="388" fill="#EF4444" font-size="14" font-weight="700">Confused - Agitated</text>
  <text x="320" y="388" fill="#EF4444" font-size="10" font-weight="600">(MOST CHALLENGING PHASE)</text>
  <text x="115" y="406" fill="#8A9AB5" font-size="11">Heightened state of activity. Bizarre, non-purposeful behavior.</text>
  <text x="115" y="422" fill="#8A9AB5" font-size="11">No short-term memory. Combative. Flight risk. In PTA.</text>
  <rect x="115" y="432" rx="4" ry="4" width="620" height="22" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="0.8"/>
  <text x="125" y="447" fill="#EF4444" font-size="10" font-weight="600">Mgmt: Safety first, low stimulation, 1:1 supervision, minimize restraints, amantadine</text>

  <!-- ===== LEVEL V ===== -->
  <rect x="50" y="472" rx="8" ry="8" width="730" height="90" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="50" y="472" rx="8" ry="8" width="50" height="90" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="75" y="510" text-anchor="middle" fill="#F59E0B" font-size="22" font-weight="700">V</text>
  <text x="115" y="495" fill="#F59E0B" font-size="14" font-weight="700">Confused - Inappropriate</text>
  <text x="115" y="513" fill="#8A9AB5" font-size="11">Non-agitated. Can follow simple commands. Random/confabulatory verbalization.</text>
  <text x="115" y="529" fill="#8A9AB5" font-size="11">Memory severely impaired. Still in PTA. Highly distractible.</text>
  <rect x="115" y="537" rx="4" ry="4" width="450" height="18" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="125" y="550" fill="#F59E0B" font-size="10" font-weight="600">Mgmt: Structured routine, repetition, simple 1-step commands, redirection</text>

  <!-- ===== LEVEL VI ===== -->
  <rect x="50" y="570" rx="8" ry="8" width="730" height="90" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="50" y="570" rx="8" ry="8" width="50" height="90" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="75" y="608" text-anchor="middle" fill="#F59E0B" font-size="22" font-weight="700">VI</text>
  <text x="115" y="593" fill="#F59E0B" font-size="14" font-weight="700">Confused - Appropriate</text>
  <text x="115" y="611" fill="#8A9AB5" font-size="11">Goal-directed behavior with cueing. Follows simple directions consistently.</text>
  <text x="115" y="627" fill="#8A9AB5" font-size="11">Emerging memory. Recognizes family. Aware of self, unaware of deficits.</text>
  <rect x="115" y="635" rx="4" ry="4" width="420" height="18" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="125" y="648" fill="#F59E0B" font-size="10" font-weight="600">Mgmt: Begin functional tasks, supervised ADLs, compensatory strategies</text>

  <!-- ===== LEVEL VII ===== -->
  <rect x="50" y="668" rx="8" ry="8" width="730" height="95" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <rect x="50" y="668" rx="8" ry="8" width="50" height="95" fill="#22D3EE" fill-opacity="0.15"/>
  <text x="75" y="708" text-anchor="middle" fill="#22D3EE" font-size="20" font-weight="700">VII</text>
  <text x="115" y="692" fill="#22D3EE" font-size="14" font-weight="700">Automatic - Appropriate</text>
  <text x="115" y="710" fill="#8A9AB5" font-size="11">Robot-like, appropriate behavior in familiar settings. Minimal confusion.</text>
  <text x="115" y="726" fill="#8A9AB5" font-size="11">Superficial awareness of deficits. Impaired judgment, planning. Out of PTA.</text>
  <rect x="115" y="734" rx="4" ry="4" width="470" height="22" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-width="0.8"/>
  <text x="125" y="749" fill="#22D3EE" font-size="10" font-weight="600">Mgmt: Community reintegration, cognitive rehab, driving eval, vocational planning</text>

  <!-- ===== LEVEL VIII ===== -->
  <rect x="50" y="770" rx="8" ry="8" width="730" height="95" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <rect x="50" y="770" rx="8" ry="8" width="50" height="95" fill="#22D3EE" fill-opacity="0.15"/>
  <text x="75" y="810" text-anchor="middle" fill="#22D3EE" font-size="18" font-weight="700">VIII</text>
  <text x="115" y="794" fill="#22D3EE" font-size="14" font-weight="700">Purposeful - Appropriate (Standby Assist)</text>
  <text x="115" y="812" fill="#8A9AB5" font-size="11">Consistently oriented. Recalls and integrates past/recent events.</text>
  <text x="115" y="828" fill="#8A9AB5" font-size="11">New learning with mild impairment. Acknowledges impairments.</text>
  <rect x="115" y="836" rx="4" ry="4" width="420" height="22" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-width="0.8"/>
  <text x="125" y="851" fill="#22D3EE" font-size="10" font-weight="600">Mgmt: Standby assistance, community skills, return to work planning</text>

  <!-- ===== LEVEL IX ===== -->
  <rect x="50" y="872" rx="8" ry="8" width="730" height="95" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <rect x="50" y="872" rx="8" ry="8" width="50" height="95" fill="#34D399" fill-opacity="0.15"/>
  <text x="75" y="912" text-anchor="middle" fill="#34D399" font-size="18" font-weight="700">IX</text>
  <text x="115" y="896" fill="#34D399" font-size="14" font-weight="700">Purposeful - Appropriate (Standby on Request)</text>
  <text x="115" y="914" fill="#8A9AB5" font-size="11">Independently shifts between tasks. Self-monitors accuracy.</text>
  <text x="115" y="930" fill="#8A9AB5" font-size="11">Aware of and compensates for impairments. May become depressed.</text>
  <rect x="115" y="938" rx="4" ry="4" width="450" height="22" fill="#34D399" fill-opacity="0.08" stroke="#34D399" stroke-width="0.8"/>
  <text x="125" y="953" fill="#34D399" font-size="10" font-weight="600">Mgmt: Independent community living, self-advocacy, emotional support</text>

  <!-- ===== LEVEL X ===== -->
  <rect x="50" y="974" rx="8" ry="8" width="730" height="95" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <rect x="50" y="974" rx="8" ry="8" width="50" height="95" fill="#34D399" fill-opacity="0.15"/>
  <text x="75" y="1014" text-anchor="middle" fill="#34D399" font-size="18" font-weight="700">X</text>
  <text x="115" y="998" fill="#34D399" font-size="14" font-weight="700">Purposeful - Appropriate (Modified Independent)</text>
  <text x="115" y="1016" fill="#8A9AB5" font-size="11">Handles multiple tasks simultaneously. Independently uses compensatory strategies.</text>
  <text x="115" y="1032" fill="#8A9AB5" font-size="11">May require more time or periodic breaks. Anticipates problems.</text>
  <rect x="115" y="1040" rx="4" ry="4" width="380" height="22" fill="#34D399" fill-opacity="0.08" stroke="#34D399" stroke-width="0.8"/>
  <text x="125" y="1055" fill="#34D399" font-size="10" font-weight="600">Mgmt: Modified independence, long-term follow-up, ongoing support</text>

  <!-- ===== PTA NOTE ===== -->
  <rect x="100" y="1085" rx="10" ry="10" width="600" height="55" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="115" y="1108" fill="#F59E0B" font-size="12" font-weight="700">PTA NOTE:</text>
  <text x="210" y="1108" fill="#E8ECF1" font-size="11">Levels IV-VI are typically in Post-Traumatic Amnesia</text>
  <text x="115" y="1128" fill="#8A9AB5" font-size="10">PTA ends when patient consistently oriented and forming new memories (emerging at Level VII)</text>

  <!-- Category labels on right -->
  <text x="785" y="200" text-anchor="end" fill="#5A6575" font-size="10" font-weight="600" transform="rotate(-90,785,200)">UNRESPONSIVE</text>
  <text x="785" y="420" text-anchor="end" fill="#EF4444" font-size="10" font-weight="600" transform="rotate(-90,785,420)">AGITATED</text>
  <text x="785" y="570" text-anchor="end" fill="#F59E0B" font-size="10" font-weight="600" transform="rotate(-90,785,570)">CONFUSED</text>
  <text x="785" y="780" text-anchor="end" fill="#22D3EE" font-size="10" font-weight="600" transform="rotate(-90,785,780)">APPROPRIATE</text>
  <text x="785" y="960" text-anchor="end" fill="#34D399" font-size="10" font-weight="600" transform="rotate(-90,785,960)">INDEPENDENT</text>

  <!-- Footer -->
  <text x="400" y="1165" text-anchor="middle" fill="#3A4555" font-size="9">TBI Training | Board Review Quick Reference</text>
</svg>