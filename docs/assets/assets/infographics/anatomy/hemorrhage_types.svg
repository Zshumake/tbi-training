<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="0.5">CT APPEARANCE OF INTRACRANIAL HEMORRHAGES</text>
  <line x1="150" y1="52" x2="650" y2="52" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Skull outline -->
  <ellipse cx="400" cy="310" rx="195" ry="230" fill="none" stroke="#3A4255" stroke-width="3"/>
  <!-- Inner skull table -->
  <ellipse cx="400" cy="310" rx="185" ry="220" fill="none" stroke="#2A3040" stroke-width="1.5"/>

  <!-- Brain outline -->
  <ellipse cx="400" cy="310" rx="170" ry="205" fill="#1A1F2E" stroke="#3A4255" stroke-width="1.5"/>

  <!-- Midline / Falx -->
  <line x1="400" y1="90" x2="400" y2="530" stroke="#3A4255" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="545" text-anchor="middle" fill="#5A6575" font-size="10">Falx cerebri (midline)</text>

  <!-- Sulci patterns - left hemisphere -->
  <path d="M300,200 Q340,210 360,190" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M270,260 Q310,270 340,250" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M260,320 Q300,330 330,310" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M270,380 Q310,390 340,370" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M300,430 Q340,440 360,420" fill="none" stroke="#2A3545" stroke-width="1"/>
  <!-- right hemisphere -->
  <path d="M440,190 Q460,210 500,200" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M460,250 Q490,270 530,260" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M470,310 Q500,330 540,320" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M460,370 Q490,390 530,380" fill="none" stroke="#2A3545" stroke-width="1"/>
  <path d="M440,420 Q460,440 500,430" fill="none" stroke="#2A3545" stroke-width="1"/>

  <!-- Dura layers (between skull and brain) -->
  <!-- Left dura space -->
  <path d="M232,170 Q220,310 232,450" fill="none" stroke="#2A3545" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Right dura space -->
  <path d="M568,170 Q580,310 568,450" fill="none" stroke="#2A3545" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Suture lines on skull -->
  <line x1="310" y1="85" x2="290" y2="105" stroke="#4A5565" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="280" y="80" fill="#5A6575" font-size="8">Suture</text>
  <line x1="490" y1="85" x2="510" y2="105" stroke="#4A5565" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="500" y="80" fill="#5A6575" font-size="8">Suture</text>

  <!-- ===== EDH - Epidural Hematoma (RIGHT side, biconvex) ===== -->
  <!-- Biconvex/lenticular shape between skull and dura -->
  <path d="M570,200 Q600,310 570,420" fill="#EF4444" fill-opacity="0.7" stroke="#EF4444" stroke-width="1.5"/>
  <path d="M570,200 Q555,310 570,420" fill="#EF4444" fill-opacity="0.7" stroke="none"/>
  <!-- Leader line -->
  <line x1="590" y1="260" x2="720" y2="160" stroke="#EF4444" stroke-width="1.2"/>
  <circle cx="590" cy="260" r="3" fill="#EF4444"/>
  <!-- EDH Label box -->
  <rect x="640" y="100" rx="6" ry="6" width="150" height="80" fill="#1A1F2E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="715" y="122" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">EDH</text>
  <text x="715" y="138" text-anchor="middle" fill="#E8ECF1" font-size="9">Biconvex (lenticular)</text>
  <text x="715" y="153" text-anchor="middle" fill="#E8ECF1" font-size="9">Middle meningeal artery</text>
  <text x="715" y="168" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">Does NOT cross sutures</text>

  <!-- ===== SDH - Subdural Hematoma (LEFT side, crescent) ===== -->
  <!-- Crescent shape conforming to brain surface -->
  <path d="M240,150 Q215,310 240,470" fill="none" stroke="none"/>
  <path d="M240,150 Q210,310 240,470 Q230,310 240,150" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="1"/>
  <!-- Thin crescent fill -->
  <path d="M240,150 C220,220 215,400 240,470" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Leader line -->
  <line x1="225" y1="260" x2="80" y2="160" stroke="#F59E0B" stroke-width="1.2"/>
  <circle cx="225" cy="260" r="3" fill="#F59E0B"/>
  <!-- SDH Label box -->
  <rect x="10" y="100" rx="6" ry="6" width="150" height="80" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="85" y="122" text-anchor="middle" fill="#F59E0B" font-size="14" font-weight="700">SDH</text>
  <text x="85" y="138" text-anchor="middle" fill="#E8ECF1" font-size="9">Crescent-shaped</text>
  <text x="85" y="153" text-anchor="middle" fill="#E8ECF1" font-size="9">Bridging veins</text>
  <text x="85" y="168" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">Crosses sutures, NOT midline</text>

  <!-- ===== SAH - Subarachnoid Hemorrhage (in sulci) ===== -->
  <!-- Blood in sulci - left side -->
  <path d="M300,200 Q340,210 360,190" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <path d="M270,260 Q310,270 340,250" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <path d="M260,320 Q300,330 330,310" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <path d="M270,380 Q310,390 340,370" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <!-- Blood in sulci - right side -->
  <path d="M440,190 Q460,210 500,200" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <path d="M460,250 Q490,270 530,260" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <path d="M470,310 Q500,330 540,320" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.7"/>
  <!-- Leader line -->
  <line x1="340" y1="370" x2="100" y2="460" stroke="#22D3EE" stroke-width="1.2"/>
  <circle cx="340" cy="370" r="3" fill="#22D3EE"/>
  <!-- SAH Label box -->
  <rect x="10" y="430" rx="6" ry="6" width="170" height="55" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="95" y="452" text-anchor="middle" fill="#22D3EE" font-size="14" font-weight="700">SAH</text>
  <text x="95" y="468" text-anchor="middle" fill="#E8ECF1" font-size="9">Blood in sulci / cisterns</text>
  <text x="95" y="478" text-anchor="middle" fill="#E8ECF1" font-size="9">Subarachnoid space</text>

  <!-- ===== ICH - Intracerebral Hemorrhage (within parenchyma) ===== -->
  <!-- Irregular hemorrhage mass in right hemisphere -->
  <path d="M460,320 Q475,290 490,310 Q505,330 495,350 Q480,365 465,350 Q450,340 460,320" fill="#34D399" fill-opacity="0.6" stroke="#34D399" stroke-width="1.5"/>
  <circle cx="478" cy="330" r="12" fill="#34D399" fill-opacity="0.4"/>
  <!-- Leader line -->
  <line x1="495" y1="345" x2="700" y2="460" stroke="#34D399" stroke-width="1.2"/>
  <circle cx="495" cy="345" r="3" fill="#34D399"/>
  <!-- ICH Label box -->
  <rect x="630" y="430" rx="6" ry="6" width="160" height="55" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="710" y="452" text-anchor="middle" fill="#34D399" font-size="14" font-weight="700">ICH</text>
  <text x="710" y="468" text-anchor="middle" fill="#E8ECF1" font-size="9">Within brain parenchyma</text>
  <text x="710" y="478" text-anchor="middle" fill="#E8ECF1" font-size="9">Intraparenchymal</text>

  <!-- Legend -->
  <rect x="250" y="555" rx="8" ry="8" width="300" height="35" fill="#1A1F2E" stroke="#3A4255" stroke-width="1"/>
  <rect x="265" y="567" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="280" y="576" fill="#E8ECF1" font-size="9">EDH</text>
  <rect x="320" y="567" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="335" y="576" fill="#E8ECF1" font-size="9">SDH</text>
  <rect x="375" y="567" width="10" height="10" rx="2" fill="#22D3EE"/>
  <text x="390" y="576" fill="#E8ECF1" font-size="9">SAH</text>
  <rect x="430" y="567" width="10" height="10" rx="2" fill="#34D399"/>
  <text x="445" y="576" fill="#E8ECF1" font-size="9">ICH</text>

  <!-- Layer labels -->
  <text x="400" y="76" text-anchor="middle" fill="#5A6575" font-size="9" font-style="italic">Skull → Dura → Arachnoid → Pia → Brain</text>
</svg>