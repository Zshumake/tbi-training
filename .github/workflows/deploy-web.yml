name: Deploy Flutter Web to shuhub.xyz

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --base-href /tbi-training/

      - name: Strip audio assets
        run: rm -rf build/web/assets/assets/audio || true

      - name: Replace docs with fresh build
        run: |
          rm -rf docs
          cp -R build/web docs
          du -sh docs/

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to docs/ — nothing to deploy."
            exit 0
          fi
          git commit -m "chore(deploy): rebuild web bundle for shuhub.xyz [skip ci]"
          git push origin main
          echo "Deployed to shuhub.xyz/tbi-training/"
