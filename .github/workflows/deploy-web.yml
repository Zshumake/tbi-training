name: Deploy Flutter Web to shuhub.xyz

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --base-href /tbi-training/

      - name: Strip audio assets from web build
        run: |
          # Audio files use LFS and do not serve correctly via GitHub Pages.
          # Podcasts remain functional on native (macOS, iOS, Android) builds.
          rm -rf build/web/assets/assets/audio || true
          # Flutter generates an AssetManifest that references audio files; patch it
          # so the web runtime does not attempt to fetch missing assets.
          if [ -f build/web/assets/AssetManifest.json ]; then
            python3 -c "
import json, os
p = 'build/web/assets/AssetManifest.json'
with open(p) as f:
    m = json.load(f)
m = {k: v for k, v in m.items() if 'audio/' not in k}
with open(p, 'w') as f:
    json.dump(m, f)
print(f'Stripped audio entries from AssetManifest.json')
"
          fi
          if [ -f build/web/assets/AssetManifest.bin.json ]; then
            python3 -c "
import json
p = 'build/web/assets/AssetManifest.bin.json'
with open(p) as f:
    m = json.load(f)
m = {k: v for k, v in m.items() if 'audio/' not in k}
with open(p, 'w') as f:
    json.dump(m, f)
print(f'Stripped audio entries from AssetManifest.bin.json')
"
          fi

      - name: Replace docs/ with fresh build
        run: |
          rm -rf docs
          cp -R build/web docs
          du -sh docs/
          find docs -type f | wc -l

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to docs/ — nothing to deploy."
          else
            git commit -m "chore(deploy): rebuild web bundle for shuhub.xyz

Auto-deploy from ${{ github.sha }}

Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push origin main
            echo "Deployed to shuhub.xyz/tbi-training/"
          fi
